<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snapshot Replay UI</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 40px;
    background: #f5f5f5;
}

.container {
    width: 750px;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

.row {
    display: flex;
    align-items: flex-start;
    gap: 15px;
    margin-bottom: 25px;
}

label {
    width: 170px;
    font-weight: bold;
    margin-top: 8px;
}

.snapshot-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex: 1;
}

.snapshot {
    min-width: 50px;
    padding: 8px 14px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #eee;
    cursor: pointer;
    text-align: center;
    user-select: none;
}

.snapshot:hover {
    background: #dbeafe;
}

.snapshot.selected {
    background: #1976d2;
    color: white;
    border-color: #1976d2;
}

button {
    padding: 8px 18px;
    cursor: pointer;
}

#status {
    margin-top: 15px;
    font-weight: bold;
    color: green;
}
</style>
</head>

<body>

<div class="container">

    <!-- Take Snapshot -->
    <div class="row">
        <label>Snapshots:</label>

        <div id="snapshotList" class="snapshot-list">
            <div class="snapshot">25</div>
        </div>

        <button onclick="takeSnapshot()">
            Take Snapshot
        </button>
    </div>

    <!-- Replay -->
    <div class="row">
        <label>Replay From:</label>

        <div id="replayList" class="snapshot-list">
            <div class="snapshot" onclick="selectSnapshot(this)">25</div>
        </div>

        <button onclick="replay()">
            Replay
        </button>
    </div>

    <div id="status"></div>

</div>



</body>
</html>
